<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אתר לימוד מילים מקצועי</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    max-width: 500px;
}

input {
    padding: 10px;
    margin: 5px;
    width: 80%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover { opacity: 0.85; }

.word-box {
    font-size: 28px;
    margin: 20px;
    min-height: 40px;
}

.progress { margin-top: 15px; }

canvas {
    margin-top: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}

.word-list {
    margin-top: 15px;
    text-align: right;
    font-size: 14px;
}
.word-item {
    background: rgba(0,0,0,0.2);
    padding: 6px;
    border-radius: 6px;
    margin: 4px 0;
}
</style>
</head>

<body>

<h1>📚 אתר לימוד מילים מקצועי</h1>

<div class="container" id="authContainer">
<h2>התחברות / הרשמה</h2>
<input type="email" id="email" placeholder="אימייל"><br>
<input type="password" id="password" placeholder="סיסמה"><br>
<button onclick="register()">הרשם</button>
<button onclick="login()">התחבר</button>
<button onclick="logout()">התנתק</button>
<div id="authMessage"></div>
</div>

<div class="container" id="appContainer" style="display:none;">

<h2>בחר כיוון לימוד</h2>
<button onclick="setMode('en')">אנגלית → עברית</button>
<button onclick="setMode('he')">עברית → אנגלית</button>

<h2>הוספת מילה</h2>
<input type="text" id="word" placeholder="מילה">
<input type="text" id="translation" placeholder="תרגום"><br>
<button onclick="addWord()">הוסף</button>

<h2>מצב לימוד</h2>
<button onclick="startLearning()">למד</button>
<button onclick="stopLearning()">עצור</button>

<div class="word-box" id="currentWord">אין מילים עדיין</div>

<button onclick="showTranslation()">הצג פירוש</button><br>
<button onclick="markGood()">יודע טוב</button>
<button onclick="markOk()">הצלחתי</button>
<button onclick="markBad()">לא יודע</button>

<div class="progress" id="progress"></div>
<canvas id="progressChart" width="300" height="150"></canvas>

<h3>רשימת מילים</h3>
<div class="word-list" id="wordList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDL_2DiBZmuZgK9wARn9u1m0gXaJkI2KGw",
  authDomain: "learning-words-psychometric.firebaseapp.com",
  projectId: "learning-words-psychometric",
  storageBucket: "learning-words-psychometric.firebasestorage.app",
  messagingSenderId: "172124382229",
  appId: "1:172124382229:web:f23c5b36caecc7ef5d5a1c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let words = { en: [], he: [] };
let mode = "en";
let currentIndex = null;
let quizMode = false;
let chart = null;

auth.onAuthStateChanged(user => {
    if (user) {
        authContainer.style.display = "none";
        appContainer.style.display = "block";
        loadWords();
    } else {
        authContainer.style.display = "block";
        appContainer.style.display = "none";
    }
});

function register() {
    auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(()=>authMessage.innerText="נרשמת בהצלחה!")
    .catch(e=>authMessage.innerText=e.message);
}

function login() {
    auth.signInWithEmailAndPassword(email.value,password.value)
    .then(()=>authMessage.innerText="מחובר!")
    .catch(e=>authMessage.innerText=e.message);
}

function logout() { auth.signOut(); }

function setMode(m) {
    mode = m;
    nextWord();
    updateProgress();
}

function addWord() {
    if (!word.value || !translation.value) return alert("תמלא את שני השדות");

    db.collection("users").doc(auth.currentUser.uid)
    .collection("words")
    .add({
        word: word.value,
        translation: translation.value,
        mode: mode,
        level: 0
    }).then(()=>{
        word.value="";
        translation.value="";
        loadWords();
    });
}

function loadWords() {
    db.collection("users").doc(auth.currentUser.uid)
    .collection("words")
    .get()
    .then(snapshot=>{
        words = { en: [], he: [] };
        wordList.innerHTML="";
        snapshot.forEach(doc=>{
            const data = doc.data();
            words[data.mode].push({id:doc.id,...data});

            wordList.innerHTML += `
            <div class="word-item">
                ${data.word} = ${data.translation}
                <button onclick="editWord('${doc.id}','${data.word}','${data.translation}')">ערוך</button>
                <button onclick="deleteWord('${doc.id}')">מחק</button>
            </div>`;
        });
        nextWord();
        updateProgress();
    });
}

function deleteWord(id){
    db.collection("users").doc(auth.currentUser.uid)
    .collection("words").doc(id).delete()
    .then(()=>loadWords());
}

function editWord(id, oldWord, oldTranslation){
    const newWord = prompt("ערוך מילה:", oldWord);
    const newTranslation = prompt("ערוך תרגום:", oldTranslation);
    if(!newWord || !newTranslation) return;

    db.collection("users").doc(auth.currentUser.uid)
    .collection("words").doc(id)
    .update({word:newWord,translation:newTranslation})
    .then(()=>loadWords());
}

function startLearning(){
    quizMode=true;
    nextWord();
}

function stopLearning(){
    quizMode=false;
    currentWord.innerText="מצב לימוד הופסק";
}

function nextWord(){
    if(words[mode].length===0){
        currentWord.innerText="אין מילים";
        return;
    }
    currentIndex=Math.floor(Math.random()*words[mode].length);
    const w=words[mode][currentIndex];
    currentWord.innerText = (mode==="en") ? w.word : w.translation;
}

function showTranslation(){
    if(currentIndex===null) return;
    const w=words[mode][currentIndex];
    currentWord.innerText =
        (mode==="en") ?
        w.word+" = "+w.translation :
        w.translation+" = "+w.word;
}

function markGood(){ updateLevel(2); }
function markOk(){ updateLevel(1); }
function markBad(){ updateLevel(0); }

function updateLevel(level){
    if(currentIndex===null) return;
    const w=words[mode][currentIndex];

    db.collection("users").doc(auth.currentUser.uid)
    .collection("words").doc(w.id)
    .update({level:level})
    .then(()=>loadWords());
}

function updateProgress(){
    const total=words[mode].length;
    const learned=words[mode].filter(w=>w.level===2).length;
    progress.innerText=`התקדמות: ${learned} מתוך ${total} מילים נלמדו`;

    const ctx=document.getElementById("progressChart").getContext("2d");
    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:["נלמדו","לא נלמדו"],
            datasets:[{
                data:[learned,total-learned],
                backgroundColor:["#00ff88","#ff4d4d"]
            }]
        }
    });
}
</script>

</body>
</html>
